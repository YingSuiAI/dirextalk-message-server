name: Stable server release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Canonical stable version (vX.Y.Z)
        required: true
        type: string
      offline_attestations_json:
        description: JSON map of offline source sha256 identities to base64 canonical attestation bytes
        required: false
        default: "{}"
        type: string

permissions:
  contents: read

concurrency:
  group: dirextalk-message-server-release
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - id: commit
        name: Bind verified commit
        run: echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
      - name: Prepare release
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/prepare.sh "$RELEASE_VERSION_INPUT"
      - name: Stage exact offline-source attestations
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
          OFFLINE_ATTESTATIONS_JSON: ${{ inputs.offline_attestations_json }}
        run: |
          printf '%s' "$OFFLINE_ATTESTATIONS_JSON" | python3 scripts/release/stage_offline_attestations.py \
            --config "release/$RELEASE_VERSION_INPUT.json" \
            --output ".release-attestations/$RELEASE_VERSION_INPUT"
      - name: Verify release and every exact image-digest edge
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/verify.sh "$RELEASE_VERSION_INPUT"

  publish:
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Require the independently verified main commit
        env:
          VERIFIED_COMMIT: ${{ needs.verify.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$VERIFIED_COMMIT"
      - name: Recreate commit-bound local verification evidence
        run: |
          bash scripts/release/prepare.sh "$RELEASE_VERSION_INPUT"
          printf '%s' "$OFFLINE_ATTESTATIONS_JSON" | python3 scripts/release/stage_offline_attestations.py \
            --config "release/$RELEASE_VERSION_INPUT.json" \
            --output ".release-attestations/$RELEASE_VERSION_INPUT"
          bash scripts/release/verify.sh "$RELEASE_VERSION_INPUT"
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
          OFFLINE_ATTESTATIONS_JSON: ${{ inputs.offline_attestations_json }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Configure one-step Git authentication
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git
      - name: Publish immutable artifacts, then latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/publish.sh "$RELEASE_VERSION_INPUT"
