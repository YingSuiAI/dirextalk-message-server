name: Stable server release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Canonical stable version (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: dirextalk-message-server-release
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: "123789"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - id: commit
        name: Bind verified commit
        run: echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
      - name: Prepare release
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/prepare.sh "$RELEASE_VERSION_INPUT"
      - name: Verify release
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/verify.sh "$RELEASE_VERSION_INPUT"

  publish:
    needs: verify
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: "123789"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Require the independently verified main commit
        env:
          VERIFIED_COMMIT: ${{ needs.verify.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$VERIFIED_COMMIT"
      - name: Recreate commit-bound local verification evidence
        run: |
          bash scripts/release/prepare.sh "$RELEASE_VERSION_INPUT"
          bash scripts/release/verify.sh "$RELEASE_VERSION_INPUT"
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Configure release tag identity and Git authentication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          gh auth setup-git
      - name: Publish version image and Release, then latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/publish.sh "$RELEASE_VERSION_INPUT"
