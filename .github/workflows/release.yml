name: Stable server release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Canonical stable version (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: dirextalk-message-server-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Prepare and verify release
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          bash scripts/release/prepare.sh "$RELEASE_VERSION_INPUT"
          bash scripts/release/verify.sh "$RELEASE_VERSION_INPUT"
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Configure one-step Git authentication
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git
      - name: Publish fixed image, GitHub Release, and latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: bash scripts/release/publish.sh "$RELEASE_VERSION_INPUT"
