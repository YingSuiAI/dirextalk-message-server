AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Dirextalk Connection Stack V2 Go Broker. Typed EC2 creation and Worker
  bootstrap remain disabled unless the deployment gate and identity
  verification key are explicitly configured.

Parameters:
  BrokerArtifactBucket:
    Type: String
    MinLength: 3
    Description: Versioned S3 bucket containing the reviewed Go Lambda zip.
  BrokerArtifactKey:
    Type: String
    MinLength: 1
    Description: Immutable S3 object key for the reviewed Go Lambda zip.
  BrokerArtifactVersion:
    Type: String
    Default: ""
    Description: Optional immutable S3 object version for the Go Lambda zip.
  ConnectionId:
    Type: String
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9._-]{7,127}$"
  ConnectionGeneration:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 9007199254740991
  NodeKeyId:
    Type: String
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$"
  NodePublicKeySpkiBase64:
    Type: String
    NoEcho: true
    MinLength: 56
    MaxLength: 256
    AllowedPattern: "^[A-Za-z0-9+/]+={0,2}$"
  DeviceApprovalKeyId:
    Type: String
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$"
  DeviceApprovalPublicKeySpkiBase64:
    Type: String
    NoEcho: true
    MinLength: 56
    MaxLength: 256
    AllowedPattern: "^[A-Za-z0-9+/]+={0,2}$"
  StageName:
    Type: String
    Default: prod
    AllowedValues:
      - prod
  WorkerBaseAmiId:
    Type: String
    AllowedPattern: "^ami-[0-9a-f]{8,17}$"
  WorkerResourceManifestDigest:
    Type: String
    AllowedPattern: "^sha256:[0-9a-f]{64}$"
  WorkerVpcId:
    Type: String
    AllowedPattern: "^vpc-[0-9a-f]{8,17}$"
  WorkerSubnetId:
    Type: String
    AllowedPattern: "^subnet-[0-9a-f]{8,17}$"
  WorkerAvailabilityZone:
    Type: String
    AllowedPattern: "^(af|ap|ca|cn|eu|il|me|mx|sa|us)(-gov)?-[a-z]+-[0-9][a-z]$"
  WorkerIdentityRsaPublicKeyPem:
    Type: String
    Default: ""
    NoEcho: true
    MaxLength: 2048
    Description: >-
      Pinned RSA public key used only to verify AWS EC2 instance identity
      document signatures. Required when deployment creation is enabled.
  EnableDeploymentCreate:
    Type: String
    Default: "false"
    AllowedValues:
      - "false"
      - "true"

Rules:
  DeploymentCreateRequiresWorkerIdentityKey:
    RuleCondition: !Equals [!Ref EnableDeploymentCreate, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref WorkerIdentityRsaPublicKeyPem, ""]]
        AssertDescription: >-
          Worker bootstrap identity verification key must be configured when
          deployment creation is enabled.

Conditions:
  HasBrokerArtifactVersion: !Not [!Equals [!Ref BrokerArtifactVersion, ""]]
  DeploymentCreateEnabled: !Equals [!Ref EnableDeploymentCreate, "true"]

Resources:
  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Dirextalk isolated worker egress only
      VpcId: !Ref WorkerVpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0

  BrokerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-connection-broker"
      RetentionInDays: 30

  CommandReceiptsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: command_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
        - AttributeName: command_id
          KeyType: RANGE

  ConnectionCountersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH

  IssuedQuotesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: quote_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
        - AttributeName: quote_id
          KeyType: RANGE

  DeploymentReservationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: deployment_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
        - AttributeName: deployment_id
          KeyType: RANGE

  ApprovalUsesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: use_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
        - AttributeName: use_id
          KeyType: RANGE

  WorkerSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl_epoch_seconds
        Enabled: true
      AttributeDefinitions:
        - AttributeName: bootstrap_session_id
          AttributeType: S
      KeySchema:
        - AttributeName: bootstrap_session_id
          KeyType: HASH

  WorkerTasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: deployment_id
          AttributeType: S
        - AttributeName: task_id
          AttributeType: S
      KeySchema:
        - AttributeName: deployment_id
          KeyType: HASH
        - AttributeName: task_id
          KeyType: RANGE

  BrokerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: broker-typed-operations-and-receipt-store
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteOwnBrokerLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-connection-broker:*"
              - Sid: PersistCommandFencesAndWorkerLeasesOnly
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:TransactWriteItems
                Resource:
                  - !GetAtt CommandReceiptsTable.Arn
                  - !GetAtt ConnectionCountersTable.Arn
                  - !GetAtt IssuedQuotesTable.Arn
                  - !GetAtt DeploymentReservationsTable.Arn
                  - !GetAtt ApprovalUsesTable.Arn
                  - !If [DeploymentCreateEnabled, !GetAtt WorkerSessionsTable.Arn, !Ref "AWS::NoValue"]
              - !If
                - DeploymentCreateEnabled
                - Sid: AccessFixedExecutionProbeTasksOnly
                  Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:Query
                    - dynamodb:TransactWriteItems
                  Resource:
                    - !GetAtt WorkerTasksTable.Arn
                - !Ref "AWS::NoValue"
              - Sid: ReadInstanceOfferingsAndCapacityOnly
                Effect: Allow
                Action:
                  - ec2:DescribeInstanceTypeOfferings
                  - ec2:DescribeInstanceTypes
                Resource: "*"
              - Sid: ReadOnDemandPriceListOnly
                Effect: Allow
                Action:
                  - pricing:GetProducts
                Resource: "*"
              - !If
                - DeploymentCreateEnabled
                - Sid: CreateFixedIsolatedWorkerOnly
                  Effect: Allow
                  Action:
                    - ec2:RunInstances
                  Resource:
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}::image/${WorkerBaseAmiId}"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:volume/*"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:subnet/${WorkerSubnetId}"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:security-group/${WorkerSecurityGroup}"
                  Condition:
                    StringEquals:
                      aws:RequestTag/dirextalk:managed: "true"
                    StringLike:
                      aws:RequestTag/dirextalk:connection-id: !Ref ConnectionId
                      aws:RequestTag/dirextalk:deployment-id: "*"
                - !Ref "AWS::NoValue"
              - !If
                - DeploymentCreateEnabled
                - Sid: TagAndObserveFixedWorkersOnly
                  Effect: Allow
                  Action:
                    - ec2:CreateTags
                  Resource:
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"
                    - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:volume/*"
                  Condition:
                    StringEquals:
                      ec2:CreateAction: RunInstances
                      aws:RequestTag/dirextalk:managed: "true"
                    StringLike:
                      aws:RequestTag/dirextalk:connection-id: !Ref ConnectionId
                      aws:RequestTag/dirextalk:deployment-id: "*"
                - !Ref "AWS::NoValue"
              - !If
                - DeploymentCreateEnabled
                - Sid: ObserveCreatedWorkersOnly
                  Effect: Allow
                  Action:
                    - ec2:DescribeInstances
                    - ec2:DescribeVolumes
                  Resource: "*"
                - !Ref "AWS::NoValue"

  BrokerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-connection-broker"
      Description: Dirextalk Connection Stack V2 Go typed Broker
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      ReservedConcurrentExecutions: 5
      Role: !GetAtt BrokerRole.Arn
      Code:
        S3Bucket: !Ref BrokerArtifactBucket
        S3Key: !Ref BrokerArtifactKey
        S3ObjectVersion: !If [HasBrokerArtifactVersion, !Ref BrokerArtifactVersion, !Ref "AWS::NoValue"]
      Environment:
        Variables:
          DIREXTALK_CONNECTION_ID: !Ref ConnectionId
          DIREXTALK_CONNECTION_GENERATION: !Ref ConnectionGeneration
          DIREXTALK_NODE_KEY_ID: !Ref NodeKeyId
          DIREXTALK_NODE_PUBLIC_KEY_SPKI_B64: !Ref NodePublicKeySpkiBase64
          DIREXTALK_DEVICE_APPROVAL_KEY_ID: !Ref DeviceApprovalKeyId
          DIREXTALK_DEVICE_APPROVAL_PUBLIC_KEY_SPKI_B64: !Ref DeviceApprovalPublicKeySpkiBase64
          DIREXTALK_STACK_ACCOUNT_ID: !Ref "AWS::AccountId"
          DIREXTALK_STACK_REGION: !Ref "AWS::Region"
          DIREXTALK_STACK_ARN: !Ref "AWS::StackId"
          DIREXTALK_AWS_URL_SUFFIX: !Ref "AWS::URLSuffix"
          DIREXTALK_BROKER_STAGE_NAME: !Ref StageName
          DIREXTALK_WORKER_BASE_AMI_ID: !Ref WorkerBaseAmiId
          DIREXTALK_WORKER_RESOURCE_MANIFEST_DIGEST: !Ref WorkerResourceManifestDigest
          DIREXTALK_WORKER_VPC_ID: !Ref WorkerVpcId
          DIREXTALK_WORKER_SUBNET_ID: !Ref WorkerSubnetId
          DIREXTALK_WORKER_AVAILABILITY_ZONE: !Ref WorkerAvailabilityZone
          DIREXTALK_WORKER_SECURITY_GROUP_ID: !GetAtt WorkerSecurityGroup.GroupId
          DIREXTALK_COMMAND_RECEIPTS_TABLE: !Ref CommandReceiptsTable
          DIREXTALK_CONNECTION_COUNTERS_TABLE: !Ref ConnectionCountersTable
          DIREXTALK_ISSUED_QUOTES_TABLE: !Ref IssuedQuotesTable
          DIREXTALK_DEPLOYMENT_RESERVATIONS_TABLE: !Ref DeploymentReservationsTable
          DIREXTALK_APPROVAL_USES_TABLE: !Ref ApprovalUsesTable
          DIREXTALK_WORKER_SESSIONS_TABLE: !Ref WorkerSessionsTable
          DIREXTALK_WORKER_TASKS_TABLE: !Ref WorkerTasksTable
          DIREXTALK_WORKER_BOOTSTRAP_ENDPOINT: !Sub "https://${BrokerAPI}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/v2/worker-sessions"
          DIREXTALK_WORKER_IDENTITY_RSA_PUBLIC_KEY_PEM: !Ref WorkerIdentityRsaPublicKeyPem
          DIREXTALK_DEPLOYMENT_CREATE_ENABLED: !Ref EnableDeploymentCreate

  BrokerAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-connection-broker"
      ProtocolType: HTTP
      Description: Signed-only Dirextalk Connection Stack V2 command endpoint.

  BrokerIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BrokerAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BrokerFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  BrokerCommandsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BrokerAPI
      RouteKey: "POST /v2/commands"
      Target: !Join ["/", ["integrations", !Ref BrokerIntegration]]

  BrokerWorkerClaimRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: DeploymentCreateEnabled
    Properties:
      ApiId: !Ref BrokerAPI
      RouteKey: "POST /v2/worker-sessions/{session_id}/claim"
      Target: !Join ["/", ["integrations", !Ref BrokerIntegration]]

  BrokerWorkerTaskClaimRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: DeploymentCreateEnabled
    Properties:
      ApiId: !Ref BrokerAPI
      RouteKey: "POST /v2/worker-sessions/{session_id}/tasks/claim"
      Target: !Join ["/", ["integrations", !Ref BrokerIntegration]]

  BrokerWorkerSessionEventRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: DeploymentCreateEnabled
    Properties:
      ApiId: !Ref BrokerAPI
      RouteKey: "POST /v2/worker-sessions/{session_id}/events"
      Target: !Join ["/", ["integrations", !Ref BrokerIntegration]]

  BrokerWorkerTaskEventRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: DeploymentCreateEnabled
    Properties:
      ApiId: !Ref BrokerAPI
      RouteKey: "POST /v2/worker-sessions/{session_id}/tasks/{task_id}/events"
      Target: !Join ["/", ["integrations", !Ref BrokerIntegration]]

  BrokerStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref BrokerAPI
      StageName: !Ref StageName
      AutoDeploy: true

  BrokerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BrokerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BrokerAPI}/${StageName}/POST/v2/commands"

  BrokerWorkerClaimInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: DeploymentCreateEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BrokerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BrokerAPI}/${StageName}/POST/v2/worker-sessions/*/claim"

  BrokerWorkerTaskClaimInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: DeploymentCreateEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BrokerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BrokerAPI}/${StageName}/POST/v2/worker-sessions/*/tasks/claim"

  BrokerWorkerSessionEventInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: DeploymentCreateEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BrokerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BrokerAPI}/${StageName}/POST/v2/worker-sessions/*/events"

  BrokerWorkerTaskEventInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: DeploymentCreateEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BrokerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${BrokerAPI}/${StageName}/POST/v2/worker-sessions/*/tasks/*/events"

Outputs:
  ConnectionId:
    Value: !Ref ConnectionId
  ConnectionGeneration:
    Value: !Ref ConnectionGeneration
  AccountId:
    Value: !Ref "AWS::AccountId"
  Region:
    Value: !Ref "AWS::Region"
  NodeKeyId:
    Value: !Ref NodeKeyId
  WorkerBaseAmiId:
    Value: !Ref WorkerBaseAmiId
  WorkerVpcId:
    Value: !Ref WorkerVpcId
  WorkerSubnetId:
    Value: !Ref WorkerSubnetId
  WorkerAvailabilityZone:
    Value: !Ref WorkerAvailabilityZone
  WorkerSecurityGroupId:
    Value: !GetAtt WorkerSecurityGroup.GroupId
  DeploymentCreateEnabled:
    Value: !Ref EnableDeploymentCreate
  WorkerResourceManifestDigest:
    Value: !Ref WorkerResourceManifestDigest
  BrokerCommandUrl:
    Description: Exact endpoint submitted to Dirextalk for signed verification.
    Value: !Sub "https://${BrokerAPI}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/v2/commands"
  WorkerBootstrapEndpoint:
    Description: Fixed base endpoint embedded in non-secret Worker bootstrap manifests.
    Value: !Sub "https://${BrokerAPI}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/v2/worker-sessions"
  BrokerRuntime:
    Value: provided.al2023
