name: direxio-p2p

x-message-server-local: &message-server-local
  image: direxio/message-server:latest
  build:
    context: .
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: direxio_message_server
      POSTGRES_PASSWORD: direxio_message_server
      POSTGRES_DB: direxio_message_server
    ports:
      - "15432:5432"
    volumes:
      - p2p_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U direxio_message_server -d direxio_message_server"]
      interval: 5s
      timeout: 5s
      retries: 20

  message-server-init:
    <<: *message-server-local
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /etc/direxio-message-server /var/direxio-message-server
        if [ ! -f /etc/direxio-message-server/matrix_key.pem ]; then
          /usr/bin/generate-keys -private-key /etc/direxio-message-server/matrix_key.pem
        fi
        if [ ! -f /etc/direxio-message-server/message-server.yaml ]; then
          /usr/bin/generate-config \
            -dir /var/direxio-message-server \
            -db postgres://direxio_message_server:direxio_message_server@postgres/direxio_message_server?sslmode=disable \
            -server ${MESSAGE_SERVER_NAME:-localhost} \
            > /etc/direxio-message-server/message-server.yaml
        fi
    volumes:
      - p2p_message_server_config:/etc/direxio-message-server
      - p2p_message_server_data:/var/direxio-message-server
    depends_on:
      postgres:
        condition: service_healthy

  message-server:
    <<: *message-server-local
    restart: unless-stopped
    environment:
      P2P_PORTAL_CREDENTIALS_FILE: /var/direxio-message-server/p2p/bootstrap.json
    command:
      - --config
      - /etc/direxio-message-server/message-server.yaml
      - --http-bind-address
      - :8008
      - --https-bind-address
      - :8448
    ports:
      - "8008:8008"
      - "8448:8448"
    volumes:
      - p2p_message_server_config:/etc/direxio-message-server
      - p2p_message_server_data:/var/direxio-message-server
    depends_on:
      postgres:
        condition: service_healthy
      message-server-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8008/_p2p/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  p2p_postgres_data:
  p2p_message_server_config:
  p2p_message_server_data:
