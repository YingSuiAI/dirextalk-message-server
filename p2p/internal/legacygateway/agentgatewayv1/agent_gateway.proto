syntax = "proto3";

package dirextalk.agent_gateway.v1;

// AgentRunIngress is the narrow authenticated boundary from the Legacy Matrix
// Gateway into Agent Control. It is mounted only on the internal listener that
// requires the exact LegacyMatrixGateway mTLS service identity. The
// authenticated identity supplies the tenant; callers cannot select a tenant
// in the request.
//
// This contract carries only opaque vNext lifecycle identifiers and digests.
// Raw prompts, Matrix room IDs, Matrix event IDs, result payloads, completion,
// and failure reporting are deliberately outside this artifact. The Gateway
// maps its source timeline onto opaque ConversationId and EventId UUIDv7 values
// before calling this service.
//
// Every request and response is capped at 65536 encoded bytes. Strings use
// UTF-8 byte limits and reject C0/C1 controls. uint64 revision values are
// limited to 1..9007199254740991.
//
// Cross-language digests use this exact framing:
//   LP(x) = U64BE(byte_length(x)) || x
//   COMMIT(domain, parts...) = SHA-256(LP(ASCII(domain)) || LP(part1) || ...)
// UUID parts are the 16 RFC 4122 network-order bytes parsed from canonical
// text; integer parts are their unsigned eight-byte big-endian representation.
//
// Before this RPC, the Gateway durably claims the unique pair consisting of
// the exact Matrix room_id UTF-8 bytes and request UUID. idempotency_digest is
// COMMIT domain "dirextalk.agent-gateway-idempotency.v1" with, in order:
// authenticated tenant UUID, exact Matrix room_id UTF-8 bytes, and exact
// non-empty idempotency_key UTF-8 bytes from the invocation. Reusing that key
// with another request UUID for the same tenant and room is a conflict.
//
// request_digest is COMMIT domain
// "dirextalk.agent-gateway-run-request.v1" with, in order: authenticated tenant
// UUID, request UUID, idempotency_digest, Installation UUID, Conversation UUID,
// request Event UUID, a one-byte preferred-Connector marker (0 absent, 1
// present), preferred Connector UUID only when present, capability count
// U64BE, each required capability as a separate part in ascending UTF-8 byte
// order, dispatch enum numeric value U64BE, and grant version U64BE. The Agent
// Control server recomputes this digest and rejects a mismatch.
//
// Conformance vector: tenant 01890f00-0000-7000-8000-000000000301, room
// !legacy:example.test, and key once-01 produce idempotency digest
// 64c1af57ad01ed35ddc024958d56c8aec12405d975429f3bedb7a72af87200d3.
// With request/installation/conversation/event/Connector UUID suffixes
// 0310/0311/0312/0313/0314 respectively, capabilities chat.streaming and
// tool.read, SINGLE, and grant 4, the request digest is
// a49fbeb70ef8a0e7e1cdf1961f5873f450a22112306c52d5992be9cbfb6acf80.
service AgentRunIngress {
  rpc CreateAgentRun(CreateAgentRunRequest) returns (CreateAgentRunResponse);
}

message CreateAgentRunRequest {
  string request_id = 1; // Canonical lowercase UUIDv7 text.
  bytes idempotency_digest = 2; // Exactly 32 domain-separated SHA-256 bytes.
  bytes request_digest = 3; // Exactly 32 domain-separated SHA-256 bytes.
  string installation_id = 4; // Canonical lowercase UUIDv7 text.
  string conversation_id = 5; // Opaque canonical lowercase UUIDv7 text; never a Matrix room ID.
  string request_event_id = 6; // Opaque canonical lowercase UUIDv7 text; never a Matrix event ID.
  optional string preferred_connector_id = 7; // Canonical lowercase UUIDv7 text when present.
  repeated string required_capabilities = 8; // At most 64 unique stable names, each 1..128 bytes.
  DispatchMode dispatch_mode = 9; // UNSPECIFIED is invalid.
  uint64 grant_version = 10; // Positive JSON-safe integer.
}

message CreateAgentRunResponse {
  string request_id = 1; // Exact accepted request ID.
  string run_id = 2; // Canonical lowercase UUIDv7 text.
  bool inserted = 3; // False only for an exact idempotent replay.
  RunRoutingState routing_state = 4; // Current durable state, including replay advancement.
}

// Only explicit single dispatch and policy-authorized ordered failover are
// admitted. Broadcast, race, and workflow are not representable here.
enum DispatchMode {
  DISPATCH_MODE_UNSPECIFIED = 0;
  DISPATCH_MODE_SINGLE = 1;
  DISPATCH_MODE_FAILOVER = 2;
}

enum RunRoutingState {
  RUN_ROUTING_STATE_UNSPECIFIED = 0;
  RUN_ROUTING_STATE_QUEUED = 1;
  RUN_ROUTING_STATE_OFFERED = 2;
  RUN_ROUTING_STATE_LEASED = 3;
  RUN_ROUTING_STATE_RECONCILE_REQUIRED = 4;
  RUN_ROUTING_STATE_EXPIRED = 5;
}
